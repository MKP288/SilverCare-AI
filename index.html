<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI-FEF</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-mark"></span>
        <span class="logo-text">Best-Friends</span>
      </div>
      <button class="new-chat-btn" id="newChatBtn" title="New Chat">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        New Chat
      </button>
    </div>

    <nav class="chat-history" id="chatHistory">
      <p class="history-label">Recent</p>
      <!-- History items injected by JS -->
    </nav>

    <div class="sidebar-footer">
      <div class="model-badge">
        <span class="model-dot"></span>
        Using Gemini 2.0
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main" id="main">

    <!-- Top bar -->
    <header class="topbar">
      <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <span class="topbar-title" id="topbarTitle">New Conversation</span>
      <div class="topbar-actions">
        <button class="icon-btn" id="clearBtn" title="Clear chat">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Chat window -->
    <div class="chat-window" id="chatWindow">

      <!-- Empty state -->
      <div class="empty-state" id="emptyState">
        <div class="empty-glow"></div>
        <div class="empty-icon">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 8v4l3 3"/><circle cx="19" cy="5" r="3" fill="currentColor" stroke="none"/>
          </svg>
        </div>
        <h2 class="empty-title">What's on your mind?</h2>
        <p class="empty-sub">Ask me anything. I'm powered by Gemini.</p>
        <div class="suggestion-chips">
          <button class="chip" data-prompt="Explain quantum computing in simple terms">Explain quantum computing</button>
          <button class="chip" data-prompt="Write a short poem about the night sky">Write me a poem</button>
          <button class="chip" data-prompt="What are the best productivity tips for developers?">Productivity tips</button>
          <button class="chip" data-prompt="Summarize the history of artificial intelligence">History of AI</button>
        </div>
      </div>

      <!-- Messages container -->
      <div class="messages" id="messages"></div>

    </div>

    <!-- Input area -->
    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          class="message-input"
          id="messageInput"
          placeholder="Message Gemini..."
          rows="1"
          maxlength="4000"
        ></textarea>
        <div class="input-actions">
          <span class="char-count" id="charCount">0 / 4000</span>
          <div class="input-btns">
            <button class="mic-btn" id="micBtn" title="Voice input">
              <svg class="mic-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
              </svg>
            </button>
            <button class="send-btn" id="sendBtn" disabled>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
      <p class="input-disclaimer">Gemini can make mistakes. Verify important information.</p>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
